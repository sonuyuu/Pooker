<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pooker Ивент</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <div class="pod">
      <div class="slot-info">занято мест: <span id="slotsCount">0</span> из 9</div>
      <form id="regForm">
        <input type="text" id="nickInput" class="nickname-input" placeholder="Введите ваш ник на сервере" required>
        <br>
        <button type="submit" class="btn-submit">Подать Заявку</button>
      </form>
    </div>

    <a href="#" class="btn-download">Скачать Ресурспак (.zip)</a>

    <div class="pod">
      <h2 class="za">Информация о Ивенте</h2>
      <p><strong>Статус:</strong> <span id="eventStatus" class="status-open">Набор открыт</span></p>
      <p><strong>Дата:</strong> 19 июля</p>
      <p><strong>Время:</strong> 18:00 МСК</p>
      <p><strong>Вид:</strong> Техасский Холдем</p>
    </div>

    <div class="pod" style="margin-top: 40px; margin-bottom: 20px; height: auto; min-height: fit-content; overflow: hidden; padding-bottom: 20px;">
      <h2 class="za">Принятые Участники</h2>
      <div id="approvedPlayersList" style="text-align: left; margin: 15px auto; max-width: 80%; font-family: sans-serif; font-size: 16px; color: #e0e0e0; line-height: 1.8;">
        Загрузка списка...
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script>
    const firebaseConfig = {
        apiKey: "AIzaSyBCiu3wo6o8CSZtbGxqXlLCFoQpRW3Z3aQ",
        databaseURL: "https://pooker-40a93-default-rtdb.firebaseio.com",
        projectId: "pooker-40a93"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const requestsRef = database.ref('requests');
    const approvedRef = database.ref('approved');

    function showToast(message, isError = false) {
      const oldToast = document.getElementById('main-toast');
      if (oldToast) oldToast.remove();
      const toast = document.createElement('div');
      toast.id = 'main-toast';
      toast.textContent = message;
      Object.assign(toast.style, {
        position: 'fixed', top: '20px', left: '50%', transform: 'translateX(-50%)',
        backgroundColor: isError ? '#c62828' : '#2e7d32', color: 'white',
        padding: '12px 24px', borderRadius: '8px', zIndex: '10000',
        fontFamily: 'sans-serif', fontWeight: 'bold', transition: 'opacity 0.3s'
      });
      document.body.appendChild(toast);
      setTimeout(() => toast.style.opacity = '0', 2500);
      setTimeout(() => toast.remove(), 2800);
    }

    approvedRef.on('value', (snapshot) => {
      const data = snapshot.val();
      const listDiv = document.getElementById('approvedPlayersList');
      const countSpan = document.getElementById('slotsCount');
      const statusSpan = document.getElementById('eventStatus');
      listDiv.innerHTML = '';
      if (!data) {
        countSpan.textContent = '0';
        listDiv.innerHTML = 'Пока никто не принят.';
        statusSpan.textContent = 'Набор открыт';
        statusSpan.className = 'status-open';
        return;
      }
      const total = Object.keys(data).length;
      countSpan.textContent = total;
      statusSpan.textContent = total >= 9 ? 'Набор закрыт' : 'Набор открыт';
      statusSpan.className = total >= 9 ? 'status-closed' : 'status-open';
      let index = 1;
      for (let id in data) {
        listDiv.innerHTML += `<b>${index}.</b> ${data[id].nickname}<br>`;
        index++;
      }
    });

    document.getElementById('regForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const nick = document.getElementById('nickInput').value.trim();
      approvedRef.once('value').then((snapshot) => {
        const data = snapshot.val() || {};
        if (Object.keys(data).length >= 9) {
          showToast('Извините, мест больше нет!', true);
          return;
        }
        requestsRef.push({ nickname: nick, date: new Date().toISOString() }).then(() => {
          showToast('Заявка успешно отправлена!');
          document.getElementById('nickInput').value = '';
        });
      });
    });
  </script>
</body>
</html>
