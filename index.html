<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pooker Ивент</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Твои оригинальные заголовки -->
  <h1 class="naz">Pooker</h1>
  <p class="pnaz">сайт sk</p>

  <!-- Блок подачи заявки -->
  <div class="pod">
    <h2 class="za">Заявка на Ивент</h2>
    <div class="zaa">занято мест: <span id="slotsCount">0</span> из 9</div>
    <form id="regForm" style="height: 100%;">
      <input type="text" id="nickInput" class="nil" placeholder="Введите ваш ник на сервере" required>
      <button type="submit" class="tt">Подать Заявку</button>
    </form>
  </div>

  <!-- Твоя кнопка скачать -->
  <a href="#" class="kno">Скачать Ресурспак (.zip)</a>

  <!-- Блок информации -->
  <div class="pod" style="height: auto;">
    <h2 class="za">Информация о Ивенте</h2>
    <p class="ty"><strong>Статус:</strong> <span id="eventStatus" class="van">Набор открыт</span></p>
    <p class="ty"><strong>Дата:</strong> 19 июля</p>
    <p class="ty"><strong>Время:</strong> 18:00 МСК</p>
    <p class="ty"><strong>Вид:</strong> Техасский Холдем</p>
  </div>

  <!-- Твой блок принятых участников -->
  <div class="yyy">
    <h2 class="za">Принятые Участники</h2>
    <div id="approvedPlayersList" class="tyyy">
      Загрузка списка...
    </div>
  </div>

  <!-- Скрипты Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script>
    const firebaseConfig = {
        apiKey: "AIzaSyBCiu3wo6o8CSZtbGxqXlLCFoQpRW3Z3aQ",
        databaseURL: "https://pooker-40a93-default-rtdb.firebaseio.com",
        projectId: "pooker-40a93"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const requestsRef = database.ref('requests');
    const approvedRef = database.ref('approved');

    function showToast(message, isError = false) {
      const oldToast = document.getElementById('main-toast');
      if (oldToast) oldToast.remove();
      const toast = document.createElement('div');
      toast.id = 'main-toast';
      toast.textContent = message;
      toast.style.backgroundColor = isError ? '#7A2B2D' : '#2C3E2B';
      toast.style.color = isError ? '#ff8888' : '#00d100';
      document.body.appendChild(toast);
      setTimeout(() => toast.style.opacity = '0', 2500);
      setTimeout(() => toast.remove(), 2800);
    }

    approvedRef.on('value', (snapshot) => {
      const data = snapshot.val();
      const listDiv = document.getElementById('approvedPlayersList');
      const countSpan = document.getElementById('slotsCount');
      const statusSpan = document.getElementById('eventStatus');
      listDiv.innerHTML = '';
      if (!data) {
        countSpan.textContent = '0';
        listDiv.innerHTML = '<span class="fri">Участников пока нет</span>';
        statusSpan.textContent = 'Набор открыт';
        statusSpan.style.color = '#00d100';
        return;
      }
      const total = Object.keys(data).length;
      countSpan.textContent = total;
      statusSpan.textContent = total >= 9 ? 'Набор закрыт' : 'Набор открыт';
      statusSpan.style.color = total >= 9 ? '#7A2B2D' : '#00d100';
      
      let index = 1;
      for (let id in data) {
        listDiv.innerHTML += `<div><b>${index}.</b> ${data[id].nickname}</div>`;
        index++;
      }
    });

    document.getElementById('regForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const nick = document.getElementById('nickInput').value.trim();
      approvedRef.once('value').then((snapshot) => {
        const data = snapshot.val() || {};
        if (Object.keys(data).length >= 9) {
          showToast('Извините, мест больше нет!', true);
          return;
        }
        requestsRef.push({ nickname: nick, date: new Date().toISOString() }).then(() => {
          showToast('Заявка успешно отправлена!');
          document.getElementById('nickInput').value = '';
        });
      });
    });
  </script>
</body>
</html>
